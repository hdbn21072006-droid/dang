services:
  # Backend Service
  - type: web
    name: student-management-backend
    runtime: node
    plan: free
    buildCommand: cd src/backend && npm install && npm run build
    startCommand: node dist-backend/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: 5000
      - key: DB_HOST
        fromDatabase:
          name: student-management-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: student-management-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: student-management-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: student-management-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: student-management-db
          property: database
      - key: JWT_SECRET
        generateValue: true
      - key: GMAIL_EMAIL
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: MAX_HISTORY_PAIRS
        value: 10
      - key: TOP_K_CHUNKS
        value: 5

databases:
  # MySQL Database
  - name: student-management-db
    databaseName: student_management
    user: student_app
    plan: free
